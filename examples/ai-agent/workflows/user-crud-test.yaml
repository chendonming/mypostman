# ============================================================
# 用户 CRUD 测试集合
# ============================================================
# 完整的用户增删改查测试流程。
# 可使用下列命令导入：
#   pulse import examples/ai-agent/workflows/user-crud-test.yaml
# 或通过 GUI: 文件 → 导入
# 或通过 MCP: import_collection_yaml("examples/ai-agent/workflows/user-crud-test.yaml")
#
# 导入后可在侧边栏右键集合 → "运行全部测试" 执行断言验证
# ============================================================

name: "用户 CRUD API"
description: "测试用户 API 的增删改查完整流程"
base_url: "https://jsonplaceholder.typicode.com"

# 集合级默认变量（{{var}} 替换，优先级低于激活环境的同名变量）
variables:
  content_type: "application/json"

# 集合级默认认证配置
auth:
  type: none

requests:
  # -------- 步骤 1: 创建用户 --------
  - name: "创建用户"
    method: POST
    url: "/users"
    headers:
      Content-Type: "{{content_type}}"
    body: |
      {
        "name": "测试用户",
        "email": "test@example.com",
        "username": "testuser"
      }
    assertions:
      - "status == 201"
      - "body.name == '测试用户'"
      - "body.id != null"

  # -------- 步骤 2: 获取用户列表 --------
  - name: "获取用户列表"
    method: GET
    url: "/users"
    assertions:
      - "status == 200"
      - "body contains example.com"
      - "body contains Test"

  # -------- 步骤 3: 获取单个用户 --------
  - name: "获取单个用户"
    method: GET
    url: "/users/1"
    assertions:
      - "status == 200"
      - "body.id == 1"
      - "body.name != null"

  # -------- 步骤 4: 更新用户 --------
  - name: "更新用户信息"
    method: PATCH
    url: "/users/1"
    headers:
      Content-Type: "{{content_type}}"
    body: |
      {
        "name": "已更新的用户"
      }
    assertions:
      - "status == 200"
      - "body.name == '已更新的用户'"

  # -------- 步骤 5: 查询已更新的用户 --------
  - name: "验证更新结果"
    method: GET
    url: "/users/1"
    assertions:
      - "status == 200"
      - "body.name == '已更新的用户'"

  # -------- 步骤 6: 删除用户 --------
  - name: "删除用户"
    method: DELETE
    url: "/users/1"
    assertions:
      - "status == 200"

  # -------- 步骤 7: 遍历所有用户 --------
  - name: "遍历所有用户"
    method: GET
    url: "/users"
    assertions:
      - "status == 200"
      - "body contains Leanne Graham"
      - "duration_ms < 5000"
